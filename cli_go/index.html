<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #1e1e1e;
      font-family: 'Courier New', monospace;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .terminal-wrapper {
      background-color: #000;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
      position: relative;
    }
    
    .terminal-header {
      background-color: #2d2d2d;
      padding: 5px 10px;
      border-radius: 5px 5px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    
    .terminal-title {
      color: #fff;
      font-size: 12px;
    }
    
    .close-btn {
      background-color: #ff5f56;
      color: white;
      border: none;
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 3px;
      cursor: pointer;
      margin: 0;
    }
    
    .close-btn:hover {
      background-color: #ff3b30;
    }
    
    button {
      background-color: #007acc;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    
    button:hover {
      background-color: #005a9e;
    }
    
    button:disabled {
      background-color: #666;
      cursor: not-allowed;
    }
    
    #status {
      text-align: center;
      color: #aaa;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Web Terminal</h1>
    <button id="connect-btn" onclick="connectTerminal()">Launch Terminal (0/10)</button>
    <div id="status"></div>
    <div id="terminals-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    const terminals = [];
    const MAX_TERMINALS = 10;
    let terminalCounter = 0;
    
    function updateButtonState() {
      const btn = document.getElementById('connect-btn');
      const activeCount = terminals.length;
      
      btn.textContent = `Launch Terminal (${activeCount}/${MAX_TERMINALS})`;
      
      if (activeCount >= MAX_TERMINALS) {
        btn.disabled = true;
      } else {
        btn.disabled = false;
      }
    }
    
    function closeTerminal(terminalId) {
      const index = terminals.findIndex(t => t.id === terminalId);
      if (index !== -1) {
        const terminalData = terminals[index];
        
        // Close WebSocket connection
        if (terminalData.socket) {
          terminalData.socket.close();
        }
        
        // Dispose terminal
        if (terminalData.term) {
          terminalData.term.dispose();
        }
        
        // Remove from DOM
        const wrapper = document.getElementById(`terminal-wrapper-${terminalId}`);
        if (wrapper) {
          wrapper.remove();
        }
        
        // Remove from array
        terminals.splice(index, 1);
        
        // Update button state
        updateButtonState();
      }
    }
    
    function connectTerminal() {
      if (terminals.length >= MAX_TERMINALS) {
        return;
      }
      
      const btn = document.getElementById('connect-btn');
      const status = document.getElementById('status');
      
      // Temporarily disable button
      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = 'Connecting...';
      
      const terminalId = ++terminalCounter;
      
      // Create wrapper div
      const wrapper = document.createElement('div');
      wrapper.id = `terminal-wrapper-${terminalId}`;
      wrapper.className = 'terminal-wrapper';
      
      // Create header
      const header = document.createElement('div');
      header.className = 'terminal-header';
      
      const title = document.createElement('span');
      title.className = 'terminal-title';
      title.textContent = `Terminal #${terminalId}`;
      
      const closeBtn = document.createElement('button');
      closeBtn.className = 'close-btn';
      closeBtn.textContent = 'Close';
      closeBtn.onclick = () => closeTerminal(terminalId);
      
      header.appendChild(title);
      header.appendChild(closeBtn);
      
      // Create terminal container
      const terminalContainer = document.createElement('div');
      terminalContainer.id = `terminal-${terminalId}`;
      
      wrapper.appendChild(header);
      wrapper.appendChild(terminalContainer);
      
      // Add to DOM
      document.getElementById('terminals-container').appendChild(wrapper);
      
      // Create terminal instance
      const term = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: 'Courier New, monospace',
        theme: {
          background: '#000000',
          foreground: '#ffffff',
          cursor: '#ffffff',
          selection: '#ffffff40'
        }
      });
      
      // Add fit addon for responsive sizing
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      
      // Open terminal in the container
      term.open(terminalContainer);
      fitAddon.fit();
      
      // Connect to WebSocket
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}`;
      const socket = new WebSocket(wsUrl);
      
      const terminalData = {
        id: terminalId,
        term: term,
        socket: socket,
        fitAddon: fitAddon
      };
      
      socket.onopen = () => {
        status.textContent = `Terminal #${terminalId} connected`;
        status.style.color = '#0f0';
        
        // Add to terminals array
        terminals.push(terminalData);
        updateButtonState();
        
        // Send terminal data to server
        term.onData((data) => {
          if (socket.readyState === WebSocket.OPEN) {
            socket.send(data);
          }
        });
        
        // Handle window resize
        const resizeHandler = () => {
          fitAddon.fit();
          if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
              type: 'resize',
              cols: term.cols,
              rows: term.rows
            }));
          }
        };
        
        window.addEventListener('resize', resizeHandler);
        terminalData.resizeHandler = resizeHandler;
        
        // Send initial size
        socket.send(JSON.stringify({
          type: 'resize',
          cols: term.cols,
          rows: term.rows
        }));
      };
      
      // Receive data from server
      socket.onmessage = (event) => {
        term.write(event.data);
      };
      
      socket.onerror = (error) => {
        status.textContent = `Terminal #${terminalId} connection error`;
        status.style.color = '#f00';
        console.error('WebSocket error:', error);
        btn.disabled = false;
        btn.textContent = originalText;
      };
      
      socket.onclose = () => {
        status.textContent = `Terminal #${terminalId} disconnected`;
        status.style.color = '#f00';
        
        // Remove resize handler
        if (terminalData.resizeHandler) {
          window.removeEventListener('resize', terminalData.resizeHandler);
        }
        
        // Auto-remove from list after disconnect
        closeTerminal(terminalId);
      };
    }
  </script>
</body>
</html>
