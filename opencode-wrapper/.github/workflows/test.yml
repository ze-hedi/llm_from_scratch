name: CI/CD Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.sh'
      - '**.json'
      - 'test/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - '**.sh'
      - '**.json'
      - 'test/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install OpenCode (if available)
      run: |
        # Try to install opencode globally
        npm install -g opencode@latest || echo "OpenCode not available, skipping"
      continue-on-error: true
    
    - name: Install OpenClaw (if available)
      run: |
        # Try to install openclaw globally
        npm install -g openclaw@latest || echo "OpenClaw not available, skipping"
      continue-on-error: true
    
    - name: Set up environment variables
      run: |
        echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
        echo "OPENCLAW_API_KEY=${{ secrets.OPENCLAW_API_KEY }}" >> $GITHUB_ENV
    
    - name: Make scripts executable
      run: |
        chmod +x opencode-wrapper.sh
        chmod +x openclaw-wrapper.sh
    
    - name: Validate shell scripts
      run: |
        # Check for syntax errors
        bash -n opencode-wrapper.sh
        bash -n openclaw-wrapper.sh
        echo "✓ Shell scripts syntax is valid"
    
    - name: Validate JSON configs
      run: |
        # Validate all agent config files
        for file in agent_*.json; do
          if [ -f "$file" ]; then
            echo "Validating $file..."
            python3 -m json.tool "$file" > /dev/null && echo "✓ $file is valid JSON" || exit 1
          fi
        done
    
    - name: Run wrapper tests
      run: |
        chmod +x test/run_tests.sh
        ./test/run_tests.sh
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENCLAW_API_KEY: ${{ secrets.OPENCLAW_API_KEY }}
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: |
          .sessions/
          test/results/
    
    - name: Clean up
      if: always()
      run: |
        rm -rf .sessions/
        rm -rf test/results/
